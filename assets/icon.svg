<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F97316;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#EA580C;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="1024" height="1024" rx="180" fill="url(#bg)" />
  <!-- 2x2 emoji grid (represented as text) -->
  <text x="256" y="380" font-size="220" text-anchor="middle">🐎</text>
  <text x="768" y="380" font-size="220" text-anchor="middle">🚴</text>
  <text x="256" y="620" font-size="220" text-anchor="middle">🚤</text>
  <text x="768" y="620" font-size="220" text-anchor="middle">🏍️</text>
  <!-- App name -->
  <text x="512" y="900" font-size="100" font-weight="bold" fill="white" text-anchor="middle" font-family="sans-serif" letter-spacing="16">ノリレク</text>
</svg>
